# Matches Makie.jl's Documenter CI pattern for GLMakie-dependent packages:
# https://github.com/MakieOrg/Makie.jl/blob/master/.github/workflows/_docs.yml
# https://docs.makie.org/stable/explanations/headless
name: Documentation

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:

# Cancel in-progress runs of the same workflow on the same ref.
concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  build:
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Install OpenGL / xvfb system packages
        run: >
          sudo apt-get update && sudo apt-get install -y
          xorg-dev mesa-utils xvfb libgl1 freeglut3-dev
          libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - name: Install Julia documentation dependencies
        # Prefixed with xvfb-run: GLMakie precompilation opens an OpenGL context.
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24'
          julia --project=docs/ -e
          'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24'
          julia --project=docs/ --color=yes docs/make.jl
